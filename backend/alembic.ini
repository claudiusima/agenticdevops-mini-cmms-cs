# Alembic configuration. Run from backend/: `alembic upgrade head`.
# The database URL is intentionally not set here: env.py resolves it from
# sqlalchemy.url when provided programmatically (tests), else from
# CMMESS_DATABASE_URL via app.config (defaulting to the dev SQLite file).

[alembic]
script_location = %(here)s/alembic

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
